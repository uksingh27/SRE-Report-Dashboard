version: '3.8'

services:
  sre-report-analyzer:
    image: sre-report-analyzer:latest
    container_name: sre-report-analyzer
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./suspicious_domains.csv:/app/suspicious_domains.csv
      - ./tenant_exceptions.csv:/app/tenant_exceptions.csv
      - ./suspicious_usernames.csv:/app/suspicious_usernames.csv
      - "/mnt/c/Users/upendras/OneDrive - NICE Ltd/SRE_real_Reports/Regions:/app/regions"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - REGIONS_BASE_PATH=/app/regions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
